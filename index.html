<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bản hùng ca Điện Biên</title>
<style>
  html,body{margin:0;height:100%;background:#0a0c10;overflow:hidden;
    font-family:"Segoe UI",system-ui,sans-serif;color:#f0e6d2;
    -webkit-tap-highlight-color:transparent;touch-action:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#000;image-rendering:pixelated;image-rendering:crisp-edges;
    box-shadow:0 0 40px rgba(0,0,0,.8);max-width:100%;max-height:100%;}
  #hint{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
    font-size:12px;color:#6b7280;pointer-events:none;text-align:center;width:90%;}
  #nameForm{position:fixed;left:50%;top:60%;transform:translate(-50%,-50%);z-index:10;
    display:none;flex-direction:column;align-items:center;gap:10px;
    background:rgba(10,16,22,.94);border:2px solid #f0c040;border-radius:14px;
    padding:16px 22px;width:min(86%,360px);box-shadow:0 8px 30px rgba(0,0,0,.6);}
  .nfTitle{color:#f0c040;font-size:15px;text-align:center;font-weight:600;}
  #nfInput{width:100%;padding:10px 12px;font-size:18px;border-radius:8px;border:2px solid #555;
    background:#0c1622;color:#fff;text-align:center;outline:none;}
  #nfInput:focus{border-color:#f0c040;}
  #nfBtn{padding:10px 28px;font-size:17px;font-weight:700;border-radius:8px;border:2px solid #f0c040;
    background:#8b2318;color:#fff;cursor:pointer;}
  #nfBtn:hover{background:#c0392b;} #nfBtn:disabled{opacity:.55;cursor:default;}
  #nfStatus{font-size:14px;min-height:18px;color:#cdd6e0;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="600" height="800"></canvas></div>
<div id="nameForm">
  <div class="nfTitle">Nhập tên để lưu vào bảng xếp hạng</div>
  <input id="nfInput" maxlength="16" placeholder="Tên của bạn" autocomplete="off" spellcheck="false">
  <button id="nfBtn">Xác nhận</button>
  <div id="nfStatus"></div>
</div>
<script>
"use strict";
/* ============================================================
   BẢN HÙNG CA ĐIỆN BIÊN — game mở đầu thuyết trình LSĐ 1945–1954
   3 giai đoạn: Timing kéo pháo → Thủ chiến hào → Boss lỗ châu mai
   ============================================================ */
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = cv.width, H = cv.height;

/* ---------- Load assets ---------- */
const ASSETS = {
  p1_cay:   'assets/sprites/phase1/cay_rung.png',
  p1_phao:  'assets/sprites/phase1/khau_phao.png',
  p1_day:   'assets/sprites/phase1/linh_day_chen_da.png',
  p1_keo:   'assets/sprites/phase1/linh_keo_day.png',
  p1_chay:  'assets/sprites/phase1/linh_chay.png',
  p1_nga:   'assets/sprites/phase1/linh_nga_chay_mau.png',
  tvd_anh:  'assets/heroes/to_vinh_dien.jpg',
  tvd_chen: 'assets/heroes/to_vinh_dien_chen_phao.jpg',
  pdg_anh:  'assets/heroes/phan_dinh_giot.jpg',
  p2_player:'assets/sprites/phase2/nguoi_choi_linh_ta.png',
  p2_phap:  'assets/sprites/phase2/linh_phap.png',
  p2_phap2: 'assets/sprites/phase2/linh_phap_chay.png',
  p2_nga:   'assets/sprites/phase2/linh_nga_chay_mau.png',
  p2_chaumai:'assets/sprites/phase2/lo_chau_mai.png',
  p2_maybay:'assets/sprites/phase2/may_bay_nem_bom.png',
  p2_danta: 'assets/sprites/phase2/dan_ta.png',
  p2_dandich:'assets/sprites/phase2/dan_dich.png',
  p2_canhbao:'assets/sprites/phase2/vong_canh_bao_bom.png',
  p2_mangtim:'assets/sprites/phase2/mang_tim.png',
  p2_baocat:'assets/sprites/phase2/bao_cat.png',
  p2_hobom: 'assets/sprites/phase2/ho_bom.png',
};
const IMG = {};
let loaded = 0, total = Object.keys(ASSETS).length, loadFail = false;
for (const k in ASSETS){
  const im = new Image();
  im.onload = ()=>{ loaded++; };
  im.onerror = ()=>{ loaded++; loadFail = true; IMG[k]=null; };
  im.src = ASSETS[k];
  IMG[k] = im;
}
// Animation lính chạy (side) — 8 khung
const RUN_CHAY = [];
const RUN_CHAY_N = 8;
total += RUN_CHAY_N;
for(let i=0;i<RUN_CHAY_N;i++){
  const im = new Image();
  im.onload = ()=>{ loaded++; };
  im.onerror = ()=>{ loaded++; };
  im.src = 'assets/sprites/anim/linh_chay_side/'+i+'.png';
  RUN_CHAY[i] = im;
}
function runFrame(t, fps=12){ return RUN_CHAY[Math.floor(t*fps)%RUN_CHAY_N]; }
// nạp 1 chu kỳ chạy bất kỳ trong assets/sprites/anim/<dir>/ (0..n-1 .png)
function loadAnim(dir, n){ const arr=[]; total+=n;
  for(let i=0;i<n;i++){ const im=new Image(); im.onload=()=>{loaded++;}; im.onerror=()=>{loaded++;};
    im.src='assets/sprites/anim/'+dir+'/'+i+'.png'; arr[i]=im; } return arr; }
const RUN_PLAYER = loadAnim('nguoi_choi_chay', 6);   // quân ta chạy (top-down)
const RUN_PHAP   = loadAnim('linh_phap_chay', 6);    // lính Pháp chạy (top-down)
function animFrame(arr, t, fps=10){ return arr[Math.floor(t*fps)%arr.length]; }

/* ---------- Helpers ---------- */
function drawSpr(img, cx, cy, scale=1, flip=false, alpha=1, flipY=false){
  if(!img || !img.width){ return; }
  const w = img.width*scale, h = img.height*scale;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  if(flip) ctx.scale(-1,1);
  if(flipY) ctx.scale(1,-1);
  ctx.drawImage(img, -w/2, -h/2, w, h);
  ctx.restore();
}
function rr(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function rand(a,b){ return a+Math.random()*(b-a); }
function dist(ax,ay,bx,by){ const dx=ax-bx,dy=ay-by; return Math.hypot(dx,dy); }
function wrapText(text, x, y, maxW, lh){
  const words = text.split(' '); let line='', yy=y;
  for(const wd of words){
    const test = line? line+' '+wd : wd;
    if(ctx.measureText(test).width > maxW && line){ ctx.fillText(line,x,yy); line=wd; yy+=lh; }
    else line = test;
  }
  if(line) ctx.fillText(line,x,yy);
  return yy;
}

/* ---------- Input ---------- */
const keys = {};
let pointer = {x:W/2, y:H/2, down:false, justTapped:false, active:false};
// Joystick ảo (điện thoại) — neo nổi tại điểm chạm, kéo để điều khiển hướng
const joy = { active:false, ox:0, oy:0, kx:0, ky:0, R:70 };
addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if(e.code==='Space') game.onAction();
  if(e.code==='Enter') game.onConfirm();
});
addEventListener('keyup', e=>{ keys[e.code]=false; });
function ptFromEvent(e){
  const r = cv.getBoundingClientRect();
  const t = e.touches? e.touches[0] : e;
  if(!t) return null;
  return { x:(t.clientX-r.left)/r.width*W, y:(t.clientY-r.top)/r.height*H };
}
function onDown(e){ const p=ptFromEvent(e); if(!p)return; pointer.x=p.x;pointer.y=p.y;
  pointer.down=true;pointer.active=true;pointer.justTapped=true;
  if(e.touches){ joy.active=true; joy.ox=p.x; joy.oy=p.y; joy.kx=p.x; joy.ky=p.y; }  // joystick CHỈ cho cảm ứng (chuột thì không)
  game.onAction(); e.preventDefault(); }
function onMove(e){ const p=ptFromEvent(e); if(!p)return; pointer.x=p.x;pointer.y=p.y;
  if(joy.active){ joy.kx=p.x; joy.ky=p.y; } e.preventDefault(); }
function onUp(e){ pointer.down=false; joy.active=false; e.preventDefault(); }
cv.addEventListener('mousedown',onDown); cv.addEventListener('mousemove',onMove);
addEventListener('mouseup',onUp);
cv.addEventListener('touchstart',onDown,{passive:false});
cv.addEventListener('touchmove',onMove,{passive:false});
cv.addEventListener('touchend',onUp,{passive:false});

/* ---------- Score ---------- */
const Score = {
  total:0, combo:0,
  add(n){ this.total += Math.round(n); },
  reset(){ this.total=0; this.combo=0; }
};

/* ---------- Bảng xếp hạng (Vercel Serverless Function + MongoDB Atlas) ----------
   Front-end chỉ gọi /api/scores (POST để lưu điểm). Connection string MongoDB
   nằm ở biến môi trường MONGODB_URI trên Vercel — KHÔNG lộ trong file này.
   Khi mở file trực tiếp (file://) sẽ tạm lưu localStorage để test. */
const LB_API = '/api/scores';
const LB_LOCAL_KEY = 'dbp_leaderboard';
const LB_IS_LOCAL = (location.protocol === 'file:');
const LB = {
  async submit(name, score, rank){
    const row = { name, score, rank };
    if(LB_IS_LOCAL){
      let lb=[]; try{ lb=JSON.parse(localStorage.getItem(LB_LOCAL_KEY)||'[]'); }catch(e){}
      lb.push({ ...row, createdAt:new Date().toISOString() });
      localStorage.setItem(LB_LOCAL_KEY, JSON.stringify(lb));
      return;
    }
    const r = await fetch(LB_API, {
      method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(row)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
  }
};

/* ---------- Form nhập tên ở màn Kết quả (HTML overlay) ---------- */
let lbSaved = null;   // {name, score} sau khi lưu thành công → hiện thông báo ở màn kết quả
function showNameForm(score, rank){
  lbSaved = null;
  const f=document.getElementById('nameForm'), inp=document.getElementById('nfInput'),
        btn=document.getElementById('nfBtn'), st=document.getElementById('nfStatus');
  f.style.display='flex'; inp.disabled=false; btn.disabled=false; st.textContent=''; inp.value='';
  setTimeout(()=>inp.focus(),60);
  btn.onclick = async ()=>{
    let name=(inp.value||'').trim(); if(!name) name='Ẩn danh'; name=name.slice(0,16);
    btn.disabled=true; inp.disabled=true; st.style.color='#cdd6e0'; st.textContent='Đang lưu...';
    try{ await LB.submit(name, score, rank);
      lbSaved = { name, score };   // ghi nhận để hiện thông báo ở màn kết quả
      hideNameForm();              // đóng block nhập tên
    }
    catch(e){ st.style.color='#ff7a6b'; st.textContent='✗ Lỗi lưu: '+e.message;
      btn.disabled=false; inp.disabled=false; }
  };
  inp.onkeydown = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); btn.onclick(); } };
}
function hideNameForm(){ const f=document.getElementById('nameForm'); if(f) f.style.display='none'; }

/* ===========================================================
   GAME STATE MACHINE
   =========================================================== */
const game = {
  state:'loading',
  t:0,
  lives:3,
  bossEntryLives:3,
  rank:'',
  set(s){ this.state=s; this.t=0; hideNameForm(); if(states[s]&&states[s].enter) states[s].enter(); },
  onAction(){ const st=states[this.state]; if(st&&st.action) st.action(); },
  onConfirm(){ const st=states[this.state]; if(st&&st.confirm) st.confirm(); },
};

/* ---------- Generic button helper ---------- */
let buttons = [];
function addButton(label,x,y,w,h,cb){ buttons.push({label,x,y,w,h,cb}); }
function drawButtons(){
  for(const b of buttons){
    const hover = pointer.x>b.x&&pointer.x<b.x+b.w&&pointer.y>b.y&&pointer.y<b.y+b.h;
    ctx.fillStyle = hover? '#c0392b':'#8b2318';
    rr(b.x,b.y,b.w,b.h,10); ctx.fill();
    ctx.strokeStyle='#f0c040'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 26px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2);
  }
}
function hitButtons(){
  for(const b of buttons){
    if(pointer.x>b.x&&pointer.x<b.x+b.w&&pointer.y>b.y&&pointer.y<b.y+b.h){ b.cb(); return true; }
  }
  return false;
}
// Bảng hướng dẫn chơi (hiện trước mỗi giai đoạn, cần bấm xác nhận mới chơi)
function drawGuide(title, lines){
  ctx.fillStyle='rgba(0,0,0,.7)'; rr(32,150,W-64,420,16); ctx.fill();
  ctx.strokeStyle='#f0c040'; ctx.lineWidth=2; rr(32,150,W-64,420,16); ctx.stroke();
  ctx.fillStyle='#f0c040'; ctx.font='bold 15px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('HƯỚNG DẪN CHƠI', W/2, 186);
  ctx.fillStyle='#fff'; ctx.font='bold 20px Segoe UI';
  ctx.fillText(title, W/2, 216);
  ctx.fillStyle='#e8eef4'; ctx.font='17px Segoe UI'; ctx.textAlign='left';
  let y=258;
  for(const ln of lines){ y = wrapText('•  '+ln, 54, y, W-108, 25) + 26; }
}

/* ---------- Background helpers ---------- */
let rainDrops = Array.from({length:90},()=>({x:rand(0,W),y:rand(0,H),l:rand(8,18),s:rand(6,11)}));
function drawRain(){
  ctx.strokeStyle='rgba(150,180,210,.35)'; ctx.lineWidth=1.5;
  for(const d of rainDrops){
    ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-2,d.y+d.l); ctx.stroke();
    d.y+=d.s; d.x-=0.7; if(d.y>H){d.y=-10;d.x=rand(0,W);}
  }
}
function nightForestBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0c2030');g.addColorStop(.5,'#0e2a22');g.addColorStop(1,'#0a1a14');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // trăng
  ctx.fillStyle='rgba(245,240,200,.12)'; ctx.beginPath(); ctx.arc(W-80,90,70,0,7); ctx.fill();
  ctx.fillStyle='rgba(245,240,200,.95)'; ctx.beginPath(); ctx.arc(W-80,90,34,0,7); ctx.fill();
  // dãy núi xa (mờ)
  ctx.fillStyle='#0b1a28';
  ctx.beginPath(); ctx.moveTo(0,300);
  ctx.lineTo(90,205); ctx.lineTo(165,278); ctx.lineTo(285,165);
  ctx.lineTo(395,272); ctx.lineTo(470,200); ctx.lineTo(565,268); ctx.lineTo(W,210);
  ctx.lineTo(W,420); ctx.lineTo(0,420); ctx.closePath(); ctx.fill();
  // dãy núi gần (đậm + có tuyết mờ trên đỉnh)
  ctx.fillStyle='#10271f';
  ctx.beginPath(); ctx.moveTo(0,380);
  ctx.lineTo(115,275); ctx.lineTo(225,350); ctx.lineTo(345,255);
  ctx.lineTo(455,345); ctx.lineTo(560,285); ctx.lineTo(W,338);
  ctx.lineTo(W,470); ctx.lineTo(0,470); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(200,220,230,.18)';
  ctx.beginPath(); ctx.moveTo(345,255); ctx.lineTo(325,285); ctx.lineTo(366,283); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(285,165); ctx.lineTo(266,200); ctx.lineTo(305,198); ctx.closePath(); ctx.fill();
  // đá nhô trên sườn núi gần
  for(const m of [[150,322,7],[252,378,6],[332,300,8],[420,362,6],[506,330,7],[565,322,5]]) drawRock(m[0],m[1],m[2]);
}
function greyBattleBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#3a3a3e');g.addColorStop(.5,'#2a2a2e');g.addColorStop(1,'#1c1c20');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
// ---- Trang trí chiến trường GĐ2.1 (cố định, không nhấp nháy) ----
const P2_CRATERS = [{x:88,y:250,r:34},{x:486,y:300,r:42},{x:300,y:200,r:28},
  {x:175,y:400,r:30},{x:520,y:170,r:24},{x:60,y:500,r:26},{x:400,y:460,r:34}];
const P2_SMOKE   = [{x:120,y:96,r:30},{x:498,y:74,r:38},{x:330,y:62,r:26}];
const P2_DEBRIS  = [[140,300,9],[360,260,7],[250,440,8],[470,400,6],[90,360,6],[540,260,8],[300,520,7]];
function drawBattlefieldDecor(){
  for(const s of P2_SMOKE){ ctx.fillStyle='rgba(120,122,128,.10)';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x+s.r*0.5,s.y-s.r*0.4,s.r*0.7,0,7); ctx.fill(); }
  for(const c of P2_CRATERS){ ctx.fillStyle='rgba(12,10,8,.5)';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.r,c.r*0.68,0,0,7); ctx.fill();
    ctx.fillStyle='rgba(46,40,30,.5)'; ctx.beginPath(); ctx.ellipse(c.x,c.y,c.r*0.62,c.r*0.42,0,0,7); ctx.fill(); }
  for(const d of P2_DEBRIS) drawRock(d[0],d[1],d[2]);
}
// hàng rào thép gai ngang màn hình tại y
function drawBarbedWire(y){
  ctx.lineCap='round';
  // cọc chống chữ X
  ctx.strokeStyle='#4a443c'; ctx.lineWidth=4;
  for(let x=24;x<W;x+=110){ ctx.beginPath();
    ctx.moveTo(x-12,y+13); ctx.lineTo(x+12,y-13); ctx.moveTo(x+12,y+13); ctx.lineTo(x-12,y-13); ctx.stroke(); }
  // 2 sợi dây thép lượn nhẹ
  ctx.strokeStyle='#aaa49a'; ctx.lineWidth=2;
  for(const off of [-7,7]){ ctx.beginPath();
    for(let x=10;x<=W-6;x+=8){ const yy=y+off+Math.sin(x*0.16)*3; if(x===10)ctx.moveTo(x,yy); else ctx.lineTo(x,yy);} ctx.stroke(); }
  // ngạnh thép (X nhỏ) dọc theo dây
  ctx.strokeStyle='#d2ccc0'; ctx.lineWidth=1.6;
  for(let x=16;x<W;x+=20){ const yy=y+Math.sin(x*0.16)*3;
    ctx.beginPath(); ctx.moveTo(x-4,yy-5); ctx.lineTo(x+4,yy+5); ctx.moveTo(x-4,yy+5); ctx.lineTo(x+4,yy-5); ctx.stroke(); }
}
// ngôi sao 5 cánh
function drawStar(cx,cy,r,color){
  ctx.fillStyle=color; ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=-Math.PI/2 + i*2*Math.PI/5, a2=a+Math.PI/5;
    ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    ctx.lineTo(cx+Math.cos(a2)*r*0.42, cy+Math.sin(a2)*r*0.42);
  }
  ctx.closePath(); ctx.fill();
}
// lá cờ đỏ sao vàng cắm ở lề trái chiến hào
function drawVNFlag(){
  ctx.fillStyle='#5a4a32'; ctx.fillRect(20,114,4,132);          // cán cờ
  ctx.fillStyle='#da251d'; ctx.fillRect(24,114,60,40);          // nền đỏ
  ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1; ctx.strokeRect(24,114,60,40);
  drawStar(24+30, 114+20, 13, '#ffcd00');                       // sao vàng 5 cánh
}
// Mặt dốc: đường thẳng từ (0,600) tới (W,400)
function p1SurfaceY(x){ return 600 - (200/W)*x; }
// Độ gập ghềnh của đường mòn theo x
function p1Bump(x){ return Math.sin(x*0.11)*4 + Math.sin(x*0.29+1.3)*2.4; }
// Tâm cụm pháo trên đường mòn (0 = chân dốc trái, 1 = đỉnh dốc phải) — nhấp nhô nhẹ theo đường gập ghềnh
function p1TrailXY(t){ const x = 80 + t*(W-280); return { x, y: p1SurfaceY(x) - 42 + p1Bump(x)*0.5 }; }
// Trang trí cảnh GĐ1 (tính 1 lần, cố định để không nhấp nháy)
const P1_TREES = [ {x:34,s:0.78,a:0.92}, {x:150,s:0.46,a:0.6}, {x:248,s:0.5,a:0.66},
  {x:332,s:0.4,a:0.55}, {x:430,s:0.6,a:0.82}, {x:520,s:0.44,a:0.62}, {x:576,s:0.72,a:0.9} ];
const P1_PUDDLES = [0.12,0.26,0.40,0.54,0.68,0.82,0.92].map((t,i)=>({ t, w:15+(i*5)%16 }));
const P1_ROCKS = Array.from({length:24},(_,i)=>({ t:(i+0.5)/24, dy:(i%2?-1:1)*rand(2,7),
  s:2+(i%3), c:(i%2?'#3a2c1b':'#0b0805') }));
// đá tảng ở vệ đường (side: +1 phía dưới dốc, -1 phía trên dốc)
const P1_SIDE_ROCKS = [ {t:0.06,side:1,s:10},{t:0.17,side:-1,s:7},{t:0.29,side:1,s:12},
  {t:0.42,side:-1,s:8},{t:0.55,side:1,s:9},{t:0.66,side:-1,s:11},{t:0.78,side:1,s:8},{t:0.9,side:-1,s:9} ];
// vẽ 1 hòn đá tảng (xám, có sáng trên + bóng dưới)
function drawRock(x,y,s){
  ctx.fillStyle='rgba(15,13,10,.5)'; ctx.beginPath(); ctx.ellipse(x,y+s*0.55,s*0.95,s*0.32,0,0,7); ctx.fill();
  ctx.fillStyle='#46423b'; ctx.beginPath(); ctx.ellipse(x,y,s,s*0.78,0,0,7); ctx.fill();
  ctx.fillStyle='#5c574d'; ctx.beginPath(); ctx.ellipse(x-s*0.28,y-s*0.26,s*0.5,s*0.34,0,0,7); ctx.fill();
}
// Vẽ sườn dốc + cây nền + đường mòn gập ghềnh có vũng nước
function drawP1Scene(){
  // sườn dốc
  ctx.fillStyle='#16241a'; ctx.beginPath();
  ctx.moveTo(0,H); ctx.lineTo(0,600); ctx.lineTo(W,400); ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  // cây ở nền: xa nhỏ mờ → gần to rõ
  for(const t of P1_TREES){ const gy = p1SurfaceY(t.x) - 336*t.s/2 + 10;
    drawSpr(IMG.p1_cay, t.x, gy, t.s, false, t.a); }
  // bóng cỏ thưa trên dốc
  ctx.fillStyle='rgba(40,70,45,.5)';
  for(let x=20;x<W;x+=46){ const y=p1SurfaceY(x); ctx.fillRect(x, y-2, 18, 4); }
  // đường mòn gập ghềnh bám trên mặt dốc
  ctx.lineJoin='round'; ctx.lineCap='round';
  const x0=46, x1=W-30, off=10;
  const ty=(x)=> p1SurfaceY(x)+off+p1Bump(x);
  const path=()=>{ ctx.beginPath(); ctx.moveTo(x0, ty(x0));
    for(let x=x0+10;x<=x1;x+=10) ctx.lineTo(x, ty(x)); };
  ctx.strokeStyle='#15100a'; ctx.lineWidth=24; path(); ctx.stroke();    // viền đất tối
  ctx.strokeStyle='#2a2013'; ctx.lineWidth=15; path(); ctx.stroke();    // mặt đường mòn
  // sỏi đá lởm chởm (gập ghềnh)
  for(const r of P1_ROCKS){ const x=x0+(x1-x0)*r.t; ctx.fillStyle=r.c; ctx.fillRect(x, ty(x)+r.dy, r.s, r.s); }
  // vũng nước phản chiếu trăng
  for(const p of P1_PUDDLES){ const x=x0+(x1-x0)*p.t, y=ty(x)+2;
    ctx.fillStyle='rgba(60,100,130,.55)'; ctx.beginPath(); ctx.ellipse(x,y,p.w,p.w*0.34,0,0,7); ctx.fill();
    ctx.fillStyle='rgba(150,190,215,.45)'; ctx.beginPath(); ctx.ellipse(x-p.w*0.22,y-1,p.w*0.38,p.w*0.12,0,0,7); ctx.fill(); }
  // đá tảng ở vệ đường
  for(const r of P1_SIDE_ROCKS){ const x=x0+(x1-x0)*r.t; drawRock(x, ty(x)+r.side*(16+r.s*0.7), r.s); }
  // hai vệt bánh xe mảnh
  ctx.strokeStyle='rgba(8,6,3,.55)'; ctx.lineWidth=2;
  for(const d of [-4,4]){ ctx.beginPath(); ctx.moveTo(x0, ty(x0)+d);
    for(let x=x0+10;x<=x1;x+=10) ctx.lineTo(x, ty(x)+d); ctx.stroke(); }
}

/* ===========================================================
   GIAI ĐOẠN 1 — TIMING KÉO PHÁO (Tô Vĩnh Diện)
   =========================================================== */
const P1 = {
  attempt:1, maxAttempt:5,         // 5 lượt canh nhịp
  progress:0, successes:0, miss:0,
  marker:0, prevMarker:0, dir:1, speed:0.95,
  zonePos:0,                       // tâm ô "Hoàn hảo" (ngẫu nhiên mỗi lượt)
  lastInZone:-99,                  // thời điểm gần nhất vạch nằm trong ô (cửa sổ ân hạn)
  perfectHalf:0.1,                 // nửa bề rộng ô vàng — nhỏ dần qua từng lượt
  shake:0, par:22, timeLeft:22, flash:0, flashCol:'#fff',
  feedback:'', feedbackT:0, warnT:0, done:false,
  reset(){
    this.attempt=1; this.progress=0; this.successes=0; this.miss=0;
    this.marker=0; this.prevMarker=0; this.dir=1; this.shake=0; this.flash=0; this.lastInZone=-99;
    this.feedback=''; this.feedbackT=0; this.warnT=0; this.done=false;
    this.par=22; this.timeLeft=22;
    this.setupAttempt(1);
  },
  setupAttempt(a){                  // độ khó tăng theo từng lượt — thanh trượt nhanh dần
    this.speed = 0.9 + a*0.18;
    if(a===4) this.speed = 2.6;     // lượt 4: tốc độ 2.6
    this.perfectHalf = Math.max(0.035, 0.11 - a*0.014);  // ô vàng nhỏ dần mỗi lượt
    if(a===4) this.perfectHalf = 0.04;   // lượt 4: ô vàng nhỏ hơn
    if(a===this.maxAttempt){        // lượt cuối (5): tốc độ 3.0 + ô nhỏ nhất + hiện CHÚ Ý
      this.speed = 3.0; this.perfectHalf = Math.max(0.03, this.perfectHalf-0.012); this.warnT = 2.2;
    }
    this.zonePos = rand(-0.6, 0.6); // ô mục tiêu ở vị trí ngẫu nhiên mỗi lượt
  }
};
states.p1 = {
  enter(){ P1.reset(); buttons=[]; },
  action(){ this.beat(); },
  confirm(){ this.beat(); },
  beat(){
    if(P1.done) return;
    // Khoảng cách từ tâm ô vàng tới ĐOẠN vạch quét khung vừa rồi, NỚI THÊM ~1 khung mỗi phía
    // (dung sai không gian) + CỬA SỔ ÂN HẠN thời gian: nếu vạch vừa ở trong ô trong ~0.13s thì vẫn tính trúng.
    const comboSpd = 1 + Math.min(Score.combo,12)*0.05;
    const tol = P1.speed*comboSpd*0.05;                  // ~1 khung di chuyển
    const lo=Math.min(P1.prevMarker,P1.marker)-tol, hi=Math.max(P1.prevMarker,P1.marker)+tol;
    const d = (P1.zonePos<lo)? lo-P1.zonePos : (P1.zonePos>hi? P1.zonePos-hi : 0);
    const recently = (game.t - P1.lastInZone) <= 0.13;   // vừa ở trong ô gần đây
    let miss=false;
    if(d <= P1.perfectHalf || recently){ Score.combo++; const mul=Math.min(2,1+(Score.combo-1)*0.1);
      Score.add(50*mul); P1.successes++; P1.feedback='HOÀN HẢO!'; P1.feedbackT=0.6; P1.flash=0.25; P1.flashCol='#7CFC60'; }
    else { Score.combo=0; Score.add(-30); P1.miss++; miss=true;
      P1.feedback='Hụt!'; P1.feedbackT=0.5; P1.shake=10; P1.flash=0.25; P1.flashCol='#e05030'; }
    P1.progress = clamp(miss? P1.progress-0.12 : P1.progress+0.2, 0, 1);
    if(miss && P1.miss>=2){ P1.done=true; game.set('p1cut'); return; }  // bấm hụt 2 lần → cut scene LUÔN
    if(P1.attempt >= P1.maxAttempt){ this.resolve(); }
    else { P1.attempt++; P1.setupAttempt(P1.attempt); }
  },
  resolve(){
    P1.done = true;
    Score.add(Math.max(0, Math.round(P1.timeLeft*8)));   // thưởng thời gian
    if(P1.miss===0) Score.add(500);                      // thưởng hoàn hảo
    if(P1.miss>=2) game.set('p1cut'); else game.set('p1done');  // an toàn: hụt ≥2 → cut scene
  },
  update(dt){
    if(P1.done) return;
    const comboSpd = 1 + Math.min(Score.combo,12)*0.05;   // combo càng cao thanh càng nhanh (tối đa +60%)
    P1.prevMarker = P1.marker;                            // lưu vị trí khung trước để bắt cả đoạn quét
    P1.marker += P1.dir*P1.speed*comboSpd*dt;
    if(P1.marker>1){P1.marker=1;P1.dir=-1;} if(P1.marker<-1){P1.marker=-1;P1.dir=1;}
    { // ghi nhận thời điểm vạch (đoạn quét) nằm trong ô vàng → phục vụ cửa sổ ân hạn
      const lo=Math.min(P1.prevMarker,P1.marker), hi=Math.max(P1.prevMarker,P1.marker);
      const dz=(P1.zonePos<lo)?lo-P1.zonePos:(P1.zonePos>hi?P1.zonePos-hi:0);
      if(dz <= P1.perfectHalf) P1.lastInZone = game.t; }
    P1.timeLeft -= dt;
    if(P1.shake>0)P1.shake-=dt*40; if(P1.flash>0)P1.flash-=dt;
    if(P1.feedbackT>0)P1.feedbackT-=dt; if(P1.warnT>0)P1.warnT-=dt;
    if(P1.timeLeft<=0){ P1.done=true; game.set('p1cut'); }
  },
  draw(){
    nightForestBg(); drawRain();
    drawP1Scene();
    // cannon climbs along the trail as progress rises
    const prog = clamp(P1.progress,0,1);
    const c = p1TrailXY(prog); const cx=c.x, cy=c.y;
    const sh = (P1.shake>0)? rand(-P1.shake,P1.shake):0;
    // đội kéo pháo bên PHẢI (3 người, mặt hướng trái về phía pháo), tay cầm dây thừng nối với khẩu pháo
    const team = [cx+70, cx+126, cx+182].map(x0=>{ const x=Math.min(x0, W-22);
      return { x, y: p1SurfaceY(x) - 42 + p1Bump(x)*0.5 - sh*0.3 }; });
    // người chèn đá đẩy phía SAU (trái/dưới dốc, mặt hướng phải)
    drawSpr(IMG.p1_day, cx-72, cy+24+sh, 0.6, false);
    // khẩu pháo
    drawSpr(IMG.p1_phao, cx, cy+sh, 0.55, false);
    // dây thừng: từ mũi pháo qua tay từng người trong đội kéo
    const ropePath=()=>{ ctx.beginPath(); ctx.moveTo(cx+34, cy-6);
      for(const q of team) ctx.lineTo(q.x-18, q.y+12); };
    ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.strokeStyle='#8a6a3c'; ctx.lineWidth=4; ropePath(); ctx.stroke();
    ctx.strokeStyle='#5a4324'; ctx.lineWidth=1.5; ropePath(); ctx.stroke();
    // 3 người kéo
    for(const q of team) drawSpr(IMG.p1_keo, q.x, q.y, 0.6, false);
    // HUD top
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(0,0,W,52);
    ctx.fillStyle='#f0c040'; ctx.font='bold 20px Segoe UI'; ctx.textAlign='left';
    ctx.fillText('LƯỢT '+P1.attempt+'/5', 16, 34);
    ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='18px Segoe UI';
    ctx.fillText('Điểm: '+Score.total+'   ⏱ '+Math.max(0,P1.timeLeft).toFixed(1)+'s', W-16, 34);
    // progress bar
    ctx.fillStyle='#333'; rr(60,66,W-120,16,8); ctx.fill();
    ctx.fillStyle='#c0392b'; rr(60,66,(W-120)*clamp(prog,0,1),16,8); ctx.fill();
    // timing bar
    const by=H-150, bw=W-120, bx=60;
    ctx.fillStyle='rgba(0,0,0,.55)'; rr(bx-10,by-34,bw+20,80,12); ctx.fill();
    ctx.fillStyle='#444'; rr(bx,by,bw,26,8); ctx.fill();
    // ô "Hoàn hảo" duy nhất, vị trí ngẫu nhiên (theo zonePos), nhỏ dần mỗi lượt
    const zc = bx + bw/2 + P1.zonePos*bw/2;
    const pz=P1.perfectHalf*bw;
    ctx.fillStyle='#f0c040'; rr(zc-pz,by,pz*2,26,5); ctx.fill();
    ctx.strokeStyle='rgba(255,240,170,.9)'; ctx.lineWidth=2; rr(zc-pz,by,pz*2,26,5); ctx.stroke();
    // marker
    const mx = bx+bw/2 + P1.marker*bw/2;
    ctx.fillStyle='#fff'; ctx.fillRect(mx-3,by-8,6,42);
    ctx.fillStyle='#ddd'; ctx.font='14px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('Bấm Space / chạm khi vạch trắng vào ô vàng', W/2, by+62);
    // feedback
    if(P1.feedbackT>0){ ctx.font='bold 30px Segoe UI'; ctx.textAlign='center';
      ctx.fillStyle = P1.feedback==='Hụt!'? '#e05030': P1.feedback==='HOÀN HẢO!'?'#7CFC60':'#9bd';
      ctx.fillText(P1.feedback + (Score.combo>1&&P1.feedback!=='Hụt!'? '  x'+Score.combo:''), W/2, by-60); }
    // CHÚ Ý ở lượt cuối
    if(P1.warnT>0){
      const a=Math.min(1,P1.warnT)* (0.55+0.45*Math.sin(P1.warnT*12));
      ctx.fillStyle='rgba(200,40,30,'+(0.5*a)+')'; ctx.fillRect(0,150,W,90);
      ctx.fillStyle='rgba(255,230,120,'+a+')'; ctx.font='bold 40px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('⚠ CHÚ Ý — LƯỢT CUỐI!', W/2, 205);
    }
    if(P1.flash>0){ ctx.fillStyle='rgba(255,255,255,'+(P1.flash*0.25)+')'; ctx.fillRect(0,0,W,H); }
  }
};

/* ----- P1 lose cutscene (Tô Vĩnh Diện) ----- */
states.p1cut = {
  enter(){ this.timer=0; buttons=[];
    addButton('Tiếp tục ▶', W/2-120,H-130,240,56, ()=>game.set('p2enter')); },
  action(){ if(this.timer>3.7 && !hitButtons()) game.set('p2enter'); },
  confirm(){ if(this.timer>3.7) game.set('p2enter'); },
  update(dt){ this.timer+=dt; },
  draw(){
    nightForestBg(); drawRain();
    drawP1Scene();
    const tm=this.timer;
    // pháo trượt xuống dốc rồi CHẬM DẦN, dừng ở lưng chừng khi lính chèn được
    const slide = Math.min(1, tm/2.0), ease = 1-(1-slide)*(1-slide);
    const prog = 0.72 - 0.44*ease;
    const p = p1TrailXY(prog);
    const stopped = tm>=2.0;
    const sh = (!stopped)? rand(-3,3):0;             // rung khi trượt
    if(!stopped){
      // lính chạy lao lên từ dưới-trái dốc tới mặt dưới-dốc của pháo, nhún chân + tung bụi
      const rt = Math.min(1, tm/1.9);
      const tx = p.x-50;                              // điểm chèn (phía dưới dốc của pháo)
      const rx = (p.x-190) + (tx-(p.x-190))*rt;
      const bob = Math.abs(Math.sin(tm*14))*4;        // nhún nhẹ theo bước chạy
      const ry = (p1SurfaceY(rx)-44) - bob;           // chân bám mặt dốc
      drawSpr(IMG.p1_phao, p.x, p.y+sh, 0.55);
      // animation lính chạy: 8 frame (linh_chay_side), quay phải lao lên dốc
      drawSpr(runFrame(tm,14) || IMG.p1_chay, rx, ry, 0.6, false);
      ctx.fillStyle='rgba(120,100,80,'+(0.3+0.3*Math.abs(Math.sin(tm*14)))+')';
      ctx.beginPath(); ctx.ellipse(rx-20, p1SurfaceY(rx)-4, 11, 4, 0,0,7); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 23px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('Pháo tuột dốc', W/2, 110);
    } else {
      // lính ngã chảy máu nằm chặn dưới bánh pháo phía dưới dốc → pháo dừng lại (giữ ~1 giây)
      drawSpr(IMG.p1_nga, p.x-26, p1SurfaceY(p.x-26)-4, 0.62);
      drawSpr(IMG.p1_phao, p.x, p.y, 0.55);
      if(tm<3.0){ ctx.fillStyle='#ffd0c0'; ctx.font='bold 22px Segoe UI'; ctx.textAlign='center';
        ctx.fillText('Anh lấy thân mình chèn pháo lại…', W/2, 110); }
    }
    // animation xong ở 2.0s → ĐỢI 1 GIÂY (đến 3.0s) → LÀM ĐEN MỜ màn hình (0.6s)
    if(tm>3.0){
      const fade = Math.min(1,(tm-3.0)/0.6)*0.92;
      ctx.fillStyle='rgba(0,0,0,'+fade+')'; ctx.fillRect(0,0,W,H);
    }
    // màn đã đen → HIỆN BLOCK "ANH HÙNG TÔ VĨNH DIỆN" (2 ảnh: chân dung + chèn pháo)
    if(tm>3.6){
      const ap = Math.min(1,(tm-3.6)/0.45);           // block hiện dần
      ctx.globalAlpha = ap;
      ctx.fillStyle='rgba(18,14,8,.93)'; rr(30,138,W-60,478,16); ctx.fill();
      ctx.strokeStyle='#f0c040'; ctx.lineWidth=2; rr(30,138,W-60,478,16); ctx.stroke();
      ctx.fillStyle='#f0c040'; ctx.font='bold 26px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('ANH HÙNG TÔ VĨNH DIỆN', W/2, 178);
      ctx.fillStyle='#cdd6e0'; ctx.font='15px Segoe UI';
      ctx.fillText('(1924 – 1954)', W/2, 202);
      // 2 ảnh thật cạnh nhau: chân dung (trái) + lấy thân chèn pháo (phải)
      const aw=104, ah=Math.round(aw*451/300), ax=126, ay=232;   // chân dung 300x451
      const bw=232, bh=Math.round(bw*502/700), bx=242, by=222;   // chèn pháo 700x502
      const sm=ctx.imageSmoothingEnabled; ctx.imageSmoothingEnabled=true;
      ctx.fillStyle='#000'; ctx.fillRect(ax-3,ay-3,aw+6,ah+6); ctx.fillRect(bx-3,by-3,bw+6,bh+6);
      if(IMG.tvd_anh && IMG.tvd_anh.width)   ctx.drawImage(IMG.tvd_anh,  ax,ay,aw,ah);
      if(IMG.tvd_chen && IMG.tvd_chen.width) ctx.drawImage(IMG.tvd_chen, bx,by,bw,bh);
      ctx.imageSmoothingEnabled=sm;
      ctx.strokeStyle='#c8a23a'; ctx.lineWidth=2;
      ctx.strokeRect(ax-3,ay-3,aw+6,ah+6); ctx.strokeRect(bx-3,by-3,bw+6,bh+6);
      ctx.fillStyle='#b9b0a0'; ctx.font='12px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('Chân dung', ax+aw/2, ay+ah+15);
      ctx.fillText('Lấy thân chèn bánh pháo', bx+bw/2, by+bh+15);
      // nội dung
      ctx.fillStyle='#f0e6d2'; ctx.font='16px Segoe UI'; ctx.textAlign='left';
      wrapText('Trong lúc kéo pháo qua đèo, dây tời bị đứt, khẩu pháo nặng lao xuống dốc. Tô Vĩnh Diện đã lấy thân mình chèn vào bánh pháo, hy sinh để giữ pháo lại cho trận địa. Tấm gương "Quyết tử để pháo không rơi" mãi khắc sâu trong lịch sử quân đội ta.', 50, 432, W-100, 24);
      ctx.globalAlpha = 1;
      drawButtons();
    }
  }
};

const TRENCH_Y = H-135;            // tường bao cát: nằm GIỮA người chơi (dưới cùng) và địch (từ trên xuống)
const P2 = {
  player:{x:W/2,y:H-74,r:22,fireCd:0,invuln:0},
  bullets:[],      // đạn ta
  ebullets:[],     // đạn địch
  enemies:[],
  wave:1, maxWave:3,
  spawnT:0, toSpawn:0,
  combo:0,
  craters:[],
  warnings:[],
  plane:null,
  boss:null,
  msg:'', msgT:0,
};
function p2MovePlayer(dt, freeY){
  const p=P2.player, sp=320*dt; const ox=p.x, oy=p.y;
  if(keys['ArrowLeft']||keys['KeyA']) p.x-=sp;
  if(keys['ArrowRight']||keys['KeyD']) p.x+=sp;
  if(freeY){ if(keys['ArrowUp']||keys['KeyW']) p.y-=sp; if(keys['ArrowDown']||keys['KeyS']) p.y+=sp; }
  if(freeY){
    if(joy.active){   // JOYSTICK ảo (cảm ứng): di chuyển theo HƯỚNG cần
      let dx=joy.kx-joy.ox, dy=joy.ky-joy.oy; const m=Math.hypot(dx,dy);
      if(m>6){ const cl=Math.min(m,joy.R)/joy.R; p.x += dx/m*cl*sp; p.y += dy/m*cl*sp; }
    } else if(pointer.down){   // CHUỘT (máy tính): di chuyển nhân vật theo con trỏ
      p.x += clamp(pointer.x-p.x,-sp*1.6,sp*1.6);
      p.y += clamp(pointer.y-p.y,-sp*1.6,sp*1.6);
    }
  } else if(pointer.down){
    p.x += clamp(pointer.x-p.x,-sp*1.6,sp*1.6);   // GĐ2.1: kéo ngang như cũ
  }
  p.x=clamp(p.x,30,W-30);
  p.y=clamp(p.y, freeY?120:H-180, H-60);
  p.moving = (Math.abs(p.x-ox)>0.1 || Math.abs(p.y-oy)>0.1);   // có di chuyển → chạy animation
  if(p.moving) p.animT=(p.animT||0)+dt;
}
function p2Fire(dt){
  const p=P2.player; p.fireCd-=dt;
  if(p.fireCd<=0){ p.fireCd=0.16; P2.bullets.push({x:p.x,y:p.y-26,vy:-620}); }
}
function p2UpdateBullets(dt){
  for(const b of P2.bullets){ b.y+=b.vy*dt; }
  P2.bullets = P2.bullets.filter(b=>b.y>-30);
}
function p2DrawPlayer(){
  const p=P2.player;
  if(p.invuln>0 && Math.floor(p.invuln*12)%2===0) return;
  const fr = p.moving ? animFrame(RUN_PLAYER, p.animT||0, 12) : RUN_PLAYER[0];
  if(fr && fr.width) drawSpr(fr, p.x, p.y, 0.6, false, 1, true);   // lật dọc → quân ta quay LÊN, về phía địch
  else drawSpr(IMG.p2_player, p.x, p.y, 0.6);
}
function p2DrawAlly(){
  const a=P2.ally; if(!a) return;
  if(!a.active){   // đang chạy vào từ mép phải → side run, quay trái (nhỏ hơn)
    const fr=animFrame(RUN_CHAY, game.t, 14)||IMG.p1_chay;
    drawSpr(fr, a.x, a.y, 0.48, true);
  } else {         // đứng cạnh người chơi, top-down quay lên
    const fr= P2.player.moving ? animFrame(RUN_PLAYER, P2.player.animT||0, 12) : RUN_PLAYER[0];
    if(fr && fr.width) drawSpr(fr, a.x, a.y, 0.52, false, 1, true); else drawSpr(IMG.p2_player, a.x, a.y, 0.52);
  }
  // dấu hiệu đồng minh (chevron xanh trên đầu)
  ctx.fillStyle='#36d1a0'; ctx.beginPath();
  ctx.moveTo(a.x,a.y-34); ctx.lineTo(a.x-6,a.y-26); ctx.lineTo(a.x+6,a.y-26); ctx.closePath(); ctx.fill();
}
function drawJoystick(){
  if(!joy.active) return;
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(joy.ox,joy.oy,joy.R,0,7); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.06)'; ctx.beginPath(); ctx.arc(joy.ox,joy.oy,joy.R,0,7); ctx.fill();
  let dx=joy.kx-joy.ox, dy=joy.ky-joy.oy; const m=Math.hypot(dx,dy);
  if(m>joy.R){ dx=dx/m*joy.R; dy=dy/m*joy.R; }
  ctx.fillStyle='rgba(240,192,64,.85)'; ctx.beginPath(); ctx.arc(joy.ox+dx,joy.oy+dy,26,0,7); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=2; ctx.stroke();
}
function p2DrawBullets(){
  for(const b of P2.bullets) drawSpr(IMG.p2_danta, b.x, b.y, 0.8);
  for(const b of P2.ebullets){ drawSpr(IMG.p2_dandich, b.x, b.y, 0.85); }
}
function p2HudLives(){
  ctx.textAlign='right'; ctx.font='22px Segoe UI';
  let s=''; for(let i=0;i<game.lives;i++) s+='❤';
  ctx.fillStyle='#e74c3c'; ctx.fillText(s, W-14, 30);
  ctx.fillStyle='#fff'; ctx.font='17px Segoe UI'; ctx.fillText('Điểm: '+Score.total, W-14, 56);
}
function p2HitPlayer(){
  const p=P2.player; if(p.invuln>0) return false;
  p.invuln=1.4; game.lives--; P2.combo=0; Score.combo=0; P2.msg='-1 ❤'; P2.msgT=0.8;
  return true;
}

states.p2_1 = {
  enter(){ this.startWave(1); P2.msg='VÒNG 1'; P2.msgT=1.4; },
  startWave(w){
    P2.wave=w; P2.enemies=[]; P2.ebullets=[];
    P2.toSpawn = (w===1)?12 : (w===2)?24 : 22; P2.spawnT=0.6; this.spawned=0;  // vòng 2 & 3 đông; vòng 3: 22 lính bắn đôi
    this.par=30; this.timeLeft=40; this.waveStartLives=game.lives;
  },
  update(dt){
    // CUT SCENE chi viện: đồng minh chạy vào từ phải, đóng băng trận đấu
    if(P2.cutsceneT>0){
      P2.cutsceneT-=dt;
      if(P2.ally){ const tx=Math.min(W-46, P2.player.x+54);
        P2.ally.x += (tx-P2.ally.x)*Math.min(1,dt*4); P2.ally.y=P2.player.y; }
      if(P2.cutsceneT<=0 && P2.ally){ P2.ally.active=true; P2.msg='ĐỒNG ĐỘI CHI VIỆN!'; P2.msgT=1.4;
        // SÓNG XUNG KÍCH từ người chơi: đẩy lùi địch + xoá sạch đạn địch
        P2.ebullets=[];
        for(const e of P2.enemies){ e.y -= 140; if(e.y<-30) e.y=-30; }
        P2.shock={x:P2.player.x, y:P2.player.y, t:0.55, max:0.55};
      }
      return;
    }
    p2MovePlayer(dt,false); p2Fire(dt); p2UpdateBullets(dt);
    // đồng minh: đi theo người chơi + tự bắn thêm 1 luồng đạn
    if(P2.ally && P2.ally.active){
      const tx=clamp(P2.player.x+54,30,W-30);
      P2.ally.x += (tx-P2.ally.x)*Math.min(1,dt*6); P2.ally.y=P2.player.y;
      P2.ally.fireCd-=dt; if(P2.ally.fireCd<=0){ P2.ally.fireCd=0.18; P2.bullets.push({x:P2.ally.x,y:P2.ally.y-26,vy:-620}); }
    }
    if(P2.player.invuln>0)P2.player.invuln-=dt; if(P2.msgT>0)P2.msgT-=dt;
    if(P2.shock){ P2.shock.t-=dt; if(P2.shock.t<=0) P2.shock=null; }
    this.timeLeft-=dt;
    // spawn
    if(this.spawned < P2.toSpawn){
      P2.spawnT-=dt;
      if(P2.spawnT<=0){ P2.spawnT = rand(0.5,1.0) - P2.wave*0.07;
        const dbl=(P2.wave>=3);   // vòng 3: loại lính mới, máu 2, bắn 2 viên
        P2.enemies.push({x:rand(40,W-40),y:-30,vy:rand(70,100)+P2.wave*16,hp:dbl?2:1,type:dbl?'double':'normal',fireT:rand(0.8,2),animT:0,animOff:rand(0,0.6)});
        this.spawned++;
      }
    }
    // enemies update
    for(const e of P2.enemies){
      e.y+=e.vy*dt; e.fireT-=dt; e.animT=(e.animT||0)+dt; if(e.hitFlash>0)e.hitFlash-=dt;
      if(e.fireT<=0 && e.y<H-220){
        const ang=Math.atan2(P2.player.y-e.y,P2.player.x-e.x);
        if(e.type==='double'){ e.fireT=rand(1.4,2.6);   // lính mới: bắn 2 viên vào chỗ người chơi
          for(const off of [-0.13,0.13]) P2.ebullets.push({x:e.x,y:e.y+20,vx:Math.cos(ang+off)*210,vy:Math.sin(ang+off)*210,bounce:0,life:6});
        } else { e.fireT=rand(1.2,2.4);
          P2.ebullets.push({x:e.x,y:e.y+20,vx:Math.cos(ang)*180,vy:Math.sin(ang)*180,bounce:0,life:6}); } }
      if(e.y>TRENCH_Y){ e.dead=true; p2HitPlayer(); }   // chạm tường bao cát → mất 1 mạng
    }
    // player bullets vs enemies
    for(const b of P2.bullets){ for(const e of P2.enemies){ if(!e.dead && dist(b.x,b.y,e.x,e.y)<26){
      b.y=-999; e.hp--;
      if(e.hp<=0){ e.dead=true; P2.combo++; const mul=Math.min(2,1+(P2.combo-1)*0.1);
        Score.add(Math.round((e.type==='double'?80:40)*mul)); }   // lính bắn-đôi đáng giá hơn
      else { e.hitFlash=0.18; e.y-=5; }   // trúng phát đầu, chưa chết → chớp trắng + nảy nhẹ
    }}}
    P2.enemies=P2.enemies.filter(e=>!e.dead);
    // enemy bullets
    for(const b of P2.ebullets){ b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      if(dist(b.x,b.y,P2.player.x,P2.player.y)<P2.player.r){ b.life=-1; p2HitPlayer(); } }
    P2.ebullets=P2.ebullets.filter(b=>b.life>0&&b.y<H+20&&b.y>-20);
    // wave clear
    if(this.spawned>=P2.toSpawn && P2.enemies.length===0){
      Score.add(200);                                       // thưởng hoàn thành vòng
      Score.add(Math.max(0,Math.round(this.timeLeft*4)));   // thưởng thời gian dư
      if(game.lives===this.waveStartLives) Score.add(500);  // giữ vững — không mất mạng trong vòng
      if(P2.wave>=P2.maxWave){ game.set('p2charge'); }       // hết vòng cuối → cut scene "Xung phong"
      else { const nw=P2.wave+1; this.startWave(nw);
        P2.msg = (nw>=3)? 'VÒNG 3 — ĐỊCH TĂNG VIỆN!' : 'VÒNG '+nw; P2.msgT=1.6; }
    }
    // xuống còn 1 mạng trong vòng 3 → gọi đồng minh chi viện (cut scene)
    if(P2.wave===3 && game.lives===1 && !P2.allySummoned && game.lives>0){
      P2.allySummoned=true; P2.cutsceneT=1.8;
      P2.ally={x:W+40, y:P2.player.y, fireCd:0, active:false};
    }
    if(game.lives<=0){ game.bossEntryLives=0; game.set('p2fall'); }   // hết mạng → cut scene khụy gối chảy máu
  },
  draw(){
    greyBattleBg();
    drawBattlefieldDecor();                 // khói, hố đạn, mảnh vỡ
    drawBarbedWire(160);                     // hàng rào thép gai phía xa (no-man's land)
    // nền hào dưới cùng (chỗ người chơi đứng)
    ctx.fillStyle='#2a241c'; ctx.fillRect(0,H-95,W,95);
    // cờ đỏ sao vàng
    drawVNFlag();
    // địch chạy animation (vẽ trước để tường bao cát che phần đã áp sát)
    for(const e of P2.enemies){
      const fr = animFrame(RUN_PHAP, (e.animT||0)+(e.animOff||0), 10);
      const sc = e.type==='double'?0.66:0.58;
      if(fr && fr.width) drawSpr(fr, e.x, e.y, sc, false, 1, true);   // lật dọc → lính Pháp quay XUỐNG, về phía người chơi
      else drawSpr(IMG.p2_phap, e.x, e.y, sc);
      if(e.hitFlash>0){ ctx.fillStyle='rgba(255,255,255,'+Math.min(0.6,e.hitFlash*3)+')'; ctx.beginPath(); ctx.arc(e.x, e.y, 20, 0,7); ctx.fill(); }
      if(e.type==='double'){ ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(e.x, e.y-26, 4, 0,7); ctx.fill(); }
    }
    // hàng rào thép gai phòng tuyến (ngay trước tường bao cát, đè lên địch áp sát)
    drawBarbedWire(TRENCH_Y-34);
    // TƯỜNG BAO CÁT nằm giữa người chơi (dưới) và địch (trên)
    for(let i=0;i<W;i+=64) drawSpr(IMG.p2_baocat, i+34, TRENCH_Y, 0.95);
    // đạn + người chơi núp dưới tường
    p2DrawBullets(); p2DrawPlayer(); p2DrawAlly();
    // sóng xung kích đẩy lùi địch
    if(P2.shock){ const k=1-P2.shock.t/P2.shock.max, r=k*440;
      ctx.strokeStyle='rgba(120,220,255,'+(1-k)*0.85+')'; ctx.lineWidth=2+10*(1-k);
      ctx.beginPath(); ctx.arc(P2.shock.x,P2.shock.y,r,0,7); ctx.stroke();
      ctx.strokeStyle='rgba(210,245,255,'+(1-k)*0.55+')'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(P2.shock.x,P2.shock.y,r*0.72,0,7); ctx.stroke(); }
    // lớp phủ + chữ khi đang cut scene chi viện
    if(P2.cutsceneT>0){
      ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.font='bold 30px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('ĐỒNG ĐỘI CHI VIỆN!', W/2+2, 132);
      ctx.fillStyle='#7CFC60'; ctx.fillText('ĐỒNG ĐỘI CHI VIỆN!', W/2, 130);
    }
    // HUD
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,40);
    ctx.fillStyle='#f0c040'; ctx.font='bold 18px Segoe UI'; ctx.textAlign='left';
    ctx.fillText('VÒNG '+P2.wave+'/'+P2.maxWave, 14, 27);
    p2HudLives();
    if(P2.msgT>0){ ctx.fillStyle='rgba(240,192,64,'+Math.min(1,P2.msgT)+')';
      ctx.font='bold 40px Segoe UI'; ctx.textAlign='center'; ctx.fillText(P2.msg, W/2, H/2); }
  },
  action(){}, confirm(){}
};

/* ----- GĐ2.2 Boss lỗ châu mai ----- */
states.p2_2 = {
  enter(){
    game.bossEntryLives = game.lives;
    P2.player.y=H-160; P2.player.invuln=1; P2.bullets=[];P2.ebullets=[];P2.craters=[];P2.warnings=[];P2.plane=null;P2.mines=[];P2.sacAnim=null;
    P2.boss = {
      holes:[ {x:130,y:130,hp:52,max:52,dead:false,sacrificed:false},
              {x:W-130,y:130,hp:52,max:52,dead:false,sacrificed:false} ],
      atk:0, atkT:1.6, phase:'idle', seq:0
    };
    P2.sacrificeDone=false; P2.msg='HẠ LỖ CHÂU MAI!'; P2.msgT=1.6;
    this.par=60; this.timeLeft=90; this.winHold=0;
  },
  bossAlive(){ return P2.boss.holes.some(h=>!h.dead); },
  doSacrifice(){
    // 1 lính chạy lên từ dưới → bắn 1 quả pháo vào ụ NHIỀU MÁU NHẤT → ụ bị phá huỷ, bốc cháy tại chỗ
    P2.sacrificeDone=true;
    const alive=P2.boss.holes.filter(h=>!h.dead);
    const target = alive[0].hp>=alive[1].hp ? alive[0] : alive[1];
    P2.sacAnim={ t:0, target, x:target.x, y:H+40, fired:false, done:false, shell:null };
    P2.msg='ĐỒNG ĐỘI CHI VIỆN — BẮN PHÁO!'; P2.msgT=1.8;
  },
  updateSac(dt){
    const s=P2.sacAnim; s.t+=dt;
    const runDur=0.9, fireY=H-190;
    if(s.t<runDur){ s.y=(H+40)+(fireY-(H+40))*(s.t/runDur); }
    else { s.y=fireY; if(!s.fired){ s.fired=true; s.shell={x:s.x, y:fireY-20, vy:-720}; } }
    if(s.shell && !s.done){ s.shell.y += s.shell.vy*dt;
      if(s.shell.y <= s.target.y+8){ s.done=true; s.shell=null;
        s.target.dead=true; s.target.burning=true;
        P2.craters.push({x:s.target.x, y:s.target.y, t:1.3});
        P2.msg='ĐÃ PHÁ HUỶ 1 Ụ SÚNG!'; P2.msgT=1.8; } }
    if(s.t>2.3){ P2.sacAnim=null; }
  },
  update(dt){
    if(this.winHold>0){ this.winHold-=dt; if(this.winHold<=0) game.set('ending'); return; }  // giữ màn 1 giây khi thắng
    if(P2.sacAnim){ this.updateSac(dt); return; }   // đóng băng khi đang cảnh bắn pháo phá ụ
    p2MovePlayer(dt,true); p2Fire(dt); p2UpdateBullets(dt);
    if(P2.player.invuln>0)P2.player.invuln-=dt; if(P2.msgT>0)P2.msgT-=dt;
    this.timeLeft-=dt;
    const boss=P2.boss;
    // player bullets vs holes
    for(const b of P2.bullets){ for(const h of boss.holes){ if(!h.dead && b.y<h.y+50 && dist(b.x,b.y,h.x,h.y)<48){
      b.y=-999;
      if(h.shieldT>0){ /* lớp khiên chặn đạn — không trừ máu */ }
      else { h.hp--; if(h.hp<=0){ h.dead=true; Score.add(2000); P2.msg='PHÁ TAN 1 LỖ CHÂU MAI! +2000'; P2.msgT=1.6; } } }}}
    // boss attacks
    boss.atkT-=dt;
    if(boss.atkT<=0 && this.bossAlive()){
      const aliveH = boss.holes.filter(h=>!h.dead);
      const maxAtk = (aliveH.length<=1) ? 4 : 3;   // còn 1 ụ → mở khoá chiêu 4 (cài mìn)
      boss.atk=(boss.atk%maxAtk)+1;
      let cd = (aliveH.length<=1) ? 1.25 : 2.2;    // còn 1 ụ → nhanh hơn
      if(aliveH.length===1 && aliveH[0].hp/aliveH[0].max < 0.25) cd = 0.8;  // dưới 25% máu → nhanh hơn nữa
      boss.atkT = cd;
      this.fireAttack(boss.atk);
    }
    // enemy bullets
    for(const b of P2.ebullets){ b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      if(b.bounce!==undefined){
        if(b.x<8){b.x=8;b.vx*=-1;b.bounce++;} if(b.x>W-8){b.x=W-8;b.vx*=-1;b.bounce++;}
        if(b.y<8){b.y=8;b.vy*=-1;b.bounce++;} if(b.y>H-8){b.y=H-8;b.vy*=-1;b.bounce++;}
        if(b.bounce>=2) b.life=-1;   // nảy khỏi tường ĐÚNG 2 lần rồi biến mất (theo ideas)
      }
      if(dist(b.x,b.y,P2.player.x,P2.player.y)<P2.player.r){ b.life=-1; this.onHit(); }
    }
    P2.ebullets=P2.ebullets.filter(b=>b.life>0);
    // plane + warnings + craters
    if(P2.plane){ P2.plane.x+=P2.plane.vx*dt;
      P2.plane.dropT-=dt;
      if(P2.plane.dropT<=0 && !P2.plane.dropped){ P2.plane.dropped=true;
        for(const w of P2.plane.spots) P2.warnings.push({x:w.x,y:w.y,t:1.1}); }
      if(P2.plane.x<-120||P2.plane.x>W+120) P2.plane=null; }
    for(const w of P2.warnings){ w.t-=dt;
      if(w.t<=0){ w.done=true; P2.craters.push({x:w.x,y:w.y,t:2.0,boom:0.25});
        if(dist(w.x,w.y,P2.player.x,P2.player.y)<70) this.onHit(); } }
    P2.warnings=P2.warnings.filter(w=>!w.done);
    for(const c of P2.craters) c.t-=dt; P2.craters=P2.craters.filter(c=>c.t>0);
    // mìn: chờ kích hoạt (armT) → người chơi dẵm vào (trong bán kính) thì NỔ
    for(const m of P2.mines){
      if(m.armT>0){ m.armT-=dt; }
      else { m.life-=dt;
        if(!m.dead && dist(m.x,m.y,P2.player.x,P2.player.y)<24){ m.dead=true;
          P2.craters.push({x:m.x,y:m.y,t:0.9}); this.onHit(); } }
    }
    P2.mines=P2.mines.filter(m=>!m.dead && m.life>0);
    // còn 1 ụ + máu < 25% → bật lớp khiên 3 giây (1 lần)
    { const aliveH=boss.holes.filter(h=>!h.dead);
      if(aliveH.length===1){ const h=aliveH[0];
        if(!h.shielded && h.hp>0 && h.hp/h.max < 0.25){ h.shielded=true; h.shieldT=3.0; P2.msg='Ụ SÚNG BẬT KHIÊN!'; P2.msgT=1.6; }
        if(h.shieldT>0) h.shieldT-=dt; } }
    // sacrifice trigger: lives drop to 1 while 2 holes alive
    if(!P2.sacrificeDone && game.lives===1 && game.bossEntryLives>=2 && P2.boss.holes.filter(h=>!h.dead).length>=2){
      this.doSacrifice();
    }
    // win
    if(!this.bossAlive()){ this.winHold=1.0; P2.msg='HẠ GỤC HỎA ĐIỂM!'; P2.msgT=1.0; return; }  // giữ màn 1 giây rồi mới sang màn kết
    // lose
    if(game.lives<=0){ game.set('p2cut'); }
  },
  onHit(){ p2HitPlayer(); },
  fireAttack(n){
    const boss=P2.boss; const holes=boss.holes.filter(h=>!h.dead);
    const p=P2.player;
    if(n===1){ // bắn loạt nhắm thẳng
      for(const h of holes){ for(let i=0;i<5;i++){ setTimeout(()=>{
        if(h.dead)return; const ang=Math.atan2(p.y-h.y,p.x-h.x);
        P2.ebullets.push({x:h.x,y:h.y,vx:Math.cos(ang)*260,vy:Math.sin(ang)*260,life:4}); }, i*120); } }
    } else if(n===2){ // quạt đạn nảy tường
      for(const h of holes){ const base=Math.atan2(p.y-h.y,p.x-h.x);
        for(let i=-2;i<=2;i++){ const a=base+i*0.32;
          P2.ebullets.push({x:h.x,y:h.y,vx:Math.cos(a)*220,vy:Math.sin(a)*220,bounce:0,life:6}); } }
    } else if(n===3){ // gọi máy bay
      const dir = Math.random()<0.5?1:-1;
      P2.plane={x:dir>0?-120:W+120,vx:dir*220,dropT:0.9,dropped:false,
        spots:[{x:rand(80,W-80),y:rand(300,H-200)},{x:rand(80,W-80),y:rand(300,H-200)},{x:p.x,y:p.y}]};
    } else { // n===4: CÀI MÌN trên mặt đất (chỉ khi còn 1 ụ)
      for(let i=0;i<6;i++) P2.mines.push({x:rand(50,W-50), y:rand(240,H-90), armT:0.7, life:7});
    }
  },
  draw(){
    greyBattleBg();
    // craters under
    for(const c of P2.craters) drawSpr(IMG.p2_hobom, c.x,c.y, 0.9, false, Math.min(1,c.t));
    // mìn — chấm đỏ đánh dấu (nhấp nháy nhanh khi đang kích hoạt)
    for(const m of P2.mines){ const arming=m.armT>0;
      const bl = arming ? (0.3+0.6*Math.abs(Math.sin(m.armT*22))) : (0.55+0.45*Math.abs(Math.sin(game.t*6)));
      ctx.strokeStyle='rgba(255,130,90,'+bl+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(m.x,m.y,11,0,7); ctx.stroke();
      ctx.fillStyle='rgba(230,40,30,'+bl+')'; ctx.beginPath(); ctx.arc(m.x,m.y,6,0,7); ctx.fill(); }
    // holes
    for(const h of P2.boss.holes){
      if(h.dead){
        if(h.burning){           // ụ bị phá huỷ → bốc cháy, ở nguyên tại chỗ
          drawSpr(IMG.p2_chaumai, h.x, h.y, 0.7, false, .55);
          for(let i=0;i<6;i++){ const fx=h.x+(Math.random()-0.5)*30, fy=h.y-6-Math.random()*26;
            ctx.fillStyle='rgba(255,'+(110+(Math.random()*110|0))+',30,'+(0.45+0.45*Math.random())+')';
            ctx.beginPath(); ctx.arc(fx, fy, 3+Math.random()*5, 0,7); ctx.fill(); }
          ctx.fillStyle='rgba(60,60,60,.28)'; ctx.beginPath(); ctx.arc(h.x,h.y-44,18,0,7); ctx.fill();
        } else if(h.sacrificed){ drawSpr(IMG.p2_baocat,h.x,h.y,1.1,false,.8); }
        continue;
      }
      drawSpr(IMG.p2_chaumai, h.x, h.y, 0.7);
      ctx.fillStyle='#222'; rr(h.x-50,h.y-58,100,10,5); ctx.fill();
      ctx.fillStyle='#b144d8'; rr(h.x-50,h.y-58,100*(h.hp/h.max),10,5); ctx.fill();
      if(h.shieldT>0){   // lớp khiên
        const a=0.35+0.4*Math.abs(Math.sin(game.t*7));
        ctx.strokeStyle='rgba(120,200,255,'+a+')'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(h.x,h.y,54,0,7); ctx.stroke();
        ctx.fillStyle='rgba(120,200,255,.12)'; ctx.beginPath(); ctx.arc(h.x,h.y,54,0,7); ctx.fill();
        ctx.fillStyle='#bfe6ff'; ctx.font='12px Segoe UI'; ctx.textAlign='center'; ctx.fillText('KHIÊN '+Math.ceil(h.shieldT)+'s', h.x, h.y-66);
      }
    }
    // warnings
    for(const w of P2.warnings) drawSpr(IMG.p2_canhbao, w.x,w.y, 1.0, false, 0.5+0.5*Math.sin(w.t*18));
    // plane
    if(P2.plane) drawSpr(IMG.p2_maybay, P2.plane.x, 70, 0.7, P2.plane.vx<0);
    p2DrawBullets(); p2DrawPlayer();
    // cảnh đồng đội bắn pháo phá ụ (sacAnim)
    if(P2.sacAnim){ const s=P2.sacAnim;
      const fr=animFrame(RUN_PLAYER, s.t, 12);
      if(fr&&fr.width) drawSpr(fr, s.x, s.y, 0.62, false,1,true); else drawSpr(IMG.p2_player, s.x, s.y, 0.62);
      if(s.shell){ ctx.fillStyle='#ffd060'; ctx.beginPath(); ctx.arc(s.shell.x,s.shell.y,6,0,7); ctx.fill();
        ctx.strokeStyle='rgba(255,180,80,.6)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(s.shell.x,s.shell.y); ctx.lineTo(s.shell.x,s.shell.y+18); ctx.stroke(); } }
    // HUD
    p2HudLives();
    if(P2.msgT>0){ ctx.fillStyle='rgba(240,192,64,'+Math.min(1,P2.msgT)+')';
      ctx.font='bold 26px Segoe UI'; ctx.textAlign='center'; ctx.fillText(P2.msg, W/2, 80); }
    drawJoystick();   // joystick ảo (điện thoại)
  },
  action(){}, confirm(){}
};

/* ----- P2 lose cutscene (Phan Đình Giót) — phân nhánh theo số ụ súng còn lại ----- */
states.p2cut = {
  enter(){
    this.timer=0; buttons=[];
    addButton('Tiếp tục ▶', W/2-120,H-130,240,56, ()=>game.set('ending'));
    const hs = (P2.boss && P2.boss.holes) ? P2.boss.holes : [];
    const alive = hs.filter(h=>!h.dead);
    this.scene = alive.length>=2 ? 'two' : 'one';     // 2 ụ còn lại / 1 ụ còn lại
    this.leftHole  = hs.find(h=>h.x <  W/2) || {x:130,y:130};
    this.rightHole = hs.find(h=>h.x >= W/2) || {x:W-130,y:130};
    this.rem = alive[0] || this.leftHole;             // ụ còn lại (cho scene 'one')
    this.remSide = this.rem.x < W/2 ? 'left' : 'right';
    this.px = (P2.player && P2.player.x) || W/2;       // vị trí xác người chơi
    this.py = (P2.player && P2.player.y) || H-160;
  },
  action(){ if(this.timer>4.3 && !hitButtons()) game.set('ending'); },
  confirm(){ if(this.timer>4.3) game.set('ending'); },
  update(dt){ this.timer+=dt; },
  drawSquad(cx, cy, tm, n){   // tiểu đội quân ta chạy lên (top-down)
    for(let i=0;i<n;i++){ const ox=(i-(n-1)/2)*32;
      const fr=animFrame(RUN_PLAYER, tm+i*0.13, 12);
      if(fr&&fr.width) drawSpr(fr, cx+ox, cy+Math.abs(ox)*0.25, 0.55, false, 1, true);
      else drawSpr(IMG.p2_player, cx+ox, cy, 0.55); }
  },
  drawTwo(tm){
    const lh=this.leftHole, rh=this.rightHole;
    // Ụ PHẢI: 1 lính chạy từ mép phải vào rồi nằm chèn
    if(tm<1.0){ drawSpr(IMG.p2_chaumai, rh.x, rh.y, 0.7);
      const t=tm/1.0, sx=(W+40)+((rh.x+34)-(W+40))*t;
      const fr=animFrame(RUN_CHAY, tm, 14)||IMG.p1_chay;
      drawSpr(fr, sx, rh.y+28, 0.6, true);                 // quay trái
    } else { drawSpr(IMG.p2_nga, rh.x, rh.y+4, 0.72); }    // nằm chèn hy sinh
    // Ụ TRÁI: tiểu đội chạy từ dưới lên tiêu diệt
    const reach=1.5;
    if(tm<reach){ drawSpr(IMG.p2_chaumai, lh.x, lh.y, 0.7);
      const t=tm/reach; this.drawSquad(lh.x, (H+40)+((lh.y+72)-(H+40))*t, tm, 3);
    } else { if(tm<reach+0.45){ const a=1-(tm-reach)/0.45;
        ctx.fillStyle='rgba(255,200,90,'+a+')'; ctx.beginPath(); ctx.arc(lh.x,lh.y,34+(tm-reach)*60,0,7); ctx.fill(); }
      this.drawSquad(lh.x, lh.y+72, tm, 3); }
    if(tm>0.5 && tm<2.8){ ctx.fillStyle='#fff'; ctx.font='bold 20px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('Đồng đội lấp lỗ châu mai, hạ nốt hỏa điểm!', W/2, 64); }
  },
  drawOne(tm){
    const rem=this.rem, side=this.remSide;
    // 1 lính chạy ra từ phía ụ còn lại rồi nằm chèn hy sinh
    if(tm<1.0){ drawSpr(IMG.p2_chaumai, rem.x, rem.y, 0.7);
      const t=tm/1.0, fromX=(side==='left')?-40:W+40;
      const sx=fromX+((rem.x+(side==='left'?-34:34))-fromX)*t;
      const fr=animFrame(RUN_CHAY, tm, 14)||IMG.p1_chay;
      drawSpr(fr, sx, rem.y+28, 0.6, side==='right');
      ctx.fillStyle='#fff'; ctx.font='bold 21px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('Anh lấy thân mình lấp lỗ châu mai…', W/2, 64);
    } else { drawSpr(IMG.p2_nga, rem.x, rem.y+4, 0.72); }
    // sau khi chèn → tiểu đội hô "TIẾN LÊN!" chạy thẳng lên
    if(tm>1.3){ const t=Math.min(1,(tm-1.3)/1.5), sy=(H+40)+((-90)-(H+40))*t;
      this.drawSquad(W/2, sy, tm, 4);
      if(tm<2.9){ ctx.fillStyle='rgba(0,0,0,.45)'; ctx.font='bold 30px Segoe UI'; ctx.textAlign='center';
        ctx.fillText('TIẾN LÊN!', W/2+2, Math.max(70,sy-58)+2);
        ctx.fillStyle='#f0c040'; ctx.fillText('TIẾN LÊN!', W/2, Math.max(70,sy-58)); } }
  },
  drawBlock(tm, ap){
    ctx.globalAlpha=ap;
    ctx.fillStyle='rgba(18,14,8,.93)'; rr(30,168,W-60,420,16); ctx.fill();
    ctx.strokeStyle='#f0c040'; ctx.lineWidth=2; rr(30,168,W-60,420,16); ctx.stroke();
    ctx.fillStyle='#f0c040'; ctx.font='bold 26px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('ANH HÙNG PHAN ĐÌNH GIÓT', W/2, 210);
    ctx.fillStyle='#cdd6e0'; ctx.font='15px Segoe UI'; ctx.fillText('(1922 – 1954)', W/2, 234);
    // ảnh chân dung (201x451 → giữ tỉ lệ), bật khử răng cưa
    const pw=120, ph=Math.round(pw*251/201), px=W/2-pw/2, py=250;
    const sm=ctx.imageSmoothingEnabled; ctx.imageSmoothingEnabled=true;
    ctx.fillStyle='#000'; ctx.fillRect(px-3,py-3,pw+6,ph+6);
    if(IMG.pdg_anh && IMG.pdg_anh.width) ctx.drawImage(IMG.pdg_anh, px,py,pw,ph);
    ctx.imageSmoothingEnabled=sm;
    ctx.strokeStyle='#c8a23a'; ctx.lineWidth=2; ctx.strokeRect(px-3,py-3,pw+6,ph+6);
    ctx.fillStyle='#f0e6d2'; ctx.font='16px Segoe UI'; ctx.textAlign='left';
    wrapText('Tại cứ điểm Him Lam, hỏa lực từ lỗ châu mai của địch ghìm chặt bước tiến của bộ đội ta. Phan Đình Giót đã lao cả thân mình lấp kín lỗ châu mai, dập tắt hỏa điểm để đồng đội xông lên tiêu diệt cứ điểm. Anh hy sinh khi vừa tròn 32 tuổi.', 52, py+ph+26, W-104, 24);
    ctx.globalAlpha=1;
    if(tm>4.3) drawButtons();   // hiện nút khi block đã hiện đủ
  },
  draw(){
    greyBattleBg(); drawBattlefieldDecor();
    const tm=this.timer;
    drawSpr(IMG.p2_nga, this.px, this.py, 0.8);     // xác người chơi vẫn nằm đó
    if(this.scene==='two') this.drawTwo(tm); else this.drawOne(tm);
    // hết cut scene (~2.5s) → CHỜ ~1 GIÂY → TỪ TỪ hiện block (fade chậm 0.8s)
    if(tm>3.5){ const ap=Math.min(1,(tm-3.5)/0.8);
      ctx.fillStyle='rgba(0,0,0,'+(ap*0.5)+')'; ctx.fillRect(0,0,W,H);
      this.drawBlock(tm, ap); }
  }
};

/* ----- ENDING text ----- */
states.ending = {
  enter(){ buttons=[]; addButton('Xem kết quả ▶', W/2-130,H-120,260,56, ()=>game.set('result')); this.timer=0; },
  action(){ if(!hitButtons()) game.set('result'); },
  confirm(){ game.set('result'); },
  update(dt){ this.timer+=dt; },
  draw(){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#2a0a0a');g.addColorStop(1,'#100404');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // lá cờ đỏ sao vàng — sao 5 cánh nằm CHÍNH GIỮA
    ctx.fillStyle='#da251d'; rr(W/2-90,90,180,110,6); ctx.fill();
    drawStar(W/2, 145, 40, '#ffcd00');
    ctx.fillStyle='#f0c040'; ctx.font='bold 26px Segoe UI';
    ctx.fillText('CHIẾN THẮNG ĐIỆN BIÊN PHỦ', W/2, 250);
    ctx.fillStyle='#f0e6d2'; ctx.font='19px Segoe UI'; ctx.textAlign='left';
    wrapText(ENDING_TEXT, 50, 300, W-100, 30);
    drawButtons();
  }
};

/* ----- RESULT / rank ----- */
states.result = {
  enter(){ buttons=[];
    const s=Score.total; game.rank = s>=10000?'S': s>=7000?'A': s>=4500?'B':'C';
    addButton('Chơi lại ⟳', W/2-130,H-130,260,56, ()=>game.set('intro'));
    showNameForm(s, game.rank); },
  action(){ if(!hitButtons()) game.set('intro'); },
  confirm(){ game.set('intro'); },
  draw(){
    nightForestBg();
    ctx.fillStyle='rgba(0,0,0,.6)'; rr(50,180,W-100,420,18); ctx.fill();
    ctx.fillStyle='#f0c040'; ctx.font='bold 30px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('KẾT QUẢ', W/2, 240);
    const stars = {S:'★★★',A:'★★',B:'★',C:''}[game.rank];
    ctx.font='bold 60px Segoe UI'; ctx.fillStyle='#f0c040'; ctx.fillText('HẠNG '+game.rank, W/2, 340);
    ctx.font='34px Segoe UI'; ctx.fillText(stars, W/2, 390);
    ctx.fillStyle='#fff'; ctx.font='26px Segoe UI';
    ctx.fillText('Tổng điểm: '+Score.total, W/2, 460);
    if(lbSaved){   // đã nhập tên & lưu xong → thông báo
      ctx.fillStyle='#7CFC60'; ctx.font='bold 19px Segoe UI';
      ctx.fillText('✓ Đã lưu "'+lbSaved.name+'" vào bảng xếp hạng', W/2, 502);
      ctx.fillStyle='#cdd6e0'; ctx.font='15px Segoe UI';
      ctx.fillText('Điểm ghi nhận: '+lbSaved.score, W/2, 528);
    } else {
      ctx.fillStyle='#cdd6e0'; ctx.font='16px Segoe UI';
      ctx.fillText('Ngưỡng: S ≥ 10000 · A ≥ 7000 · B ≥ 4500', W/2, 510);
    }
    drawButtons();
  }
};

/* ===========================================================
   MAIN LOOP
   =========================================================== */
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  game.t+=dt;
  try{
    const st=states[game.state];
    if(st.update) st.update(dt);
    st.draw();
  }catch(err){
    ctx.fillStyle='#400'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='14px monospace'; ctx.textAlign='left';
    ctx.fillText('Lỗi: '+err.message, 20, 40);
    console.error(err);
  }
  pointer.justTapped=false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
